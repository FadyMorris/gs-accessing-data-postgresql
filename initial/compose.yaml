services:
  db:
    image: postgres:18
    container_name: accessing-data-mysql-db
    restart: "no" # Change this from 'always', 'unless-stopped', or 'on-failure'
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - accessing-data-mysql:/var/lib/postgresql
    networks:
      - mynetwork

  pgadmin:
    image: dpage/pgadmin4
    container_name: accessing-data-mysql-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    env_file:
      - .env
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge

volumes:
  accessing-data-mysql:
